name: CI-Bore-RDP-Resilient

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Bore" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RemoteUser"
        }

    - name: Download Bore
      run: |
        $url = "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip"
        Invoke-WebRequest -Uri $url -OutFile bore.zip -UserAgent "NativeHost"
        Expand-Archive bore.zip -DestinationPath . -Force

    - name: Start Resilient Bore Tunnel
      run: |
        $totalTime = 21600 # 6 hours in seconds
        $startTime = Get-Date
        
        Write-Host "🚀 Starting Resilient Tunnel Loop..."
        
        while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -lt $totalTime) {
            Write-Host "Connecting to Bore..."
            # Start Bore and capture output
            $process = Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -PassThru -RedirectStandardOutput "bore_log.txt" -NoNewWindow
            
            # Wait for port assignment
            Start-Sleep -s 5
            $portInfo = Get-Content bore_log.txt | Select-String "listening at" | Select-Object -Last 1
            
            Write-Host "--------------------------"
            Write-Host "CONNECTED: $portInfo"
            Write-Host "User: RemoteUser | Pass: P@ssw0rd123!"
            Write-Host "--------------------------"
            
            # Monitor the process. If it dies, the loop restarts it.
            while (!$process.HasExited) {
                Start-Sleep -s 10
                # Safety check to break loop after 6 hours total
                if ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -ge $totalTime) { 
                    Stop-Process -Id $process.Id
                    break 
                }
            }
            Write-Host "⚠️ Connection lost or flickered. Restarting tunnel..."
            Remove-Item "bore_log.txt" -ErrorAction SilentlyContinue
        }
        
