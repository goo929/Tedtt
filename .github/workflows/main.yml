name: CI-Localtonet

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download and Extract Localtonet
      run: |
        Invoke-WebRequest https://localtonet.com/download/localtonet-windows-x64.zip -OutFile localtonet.zip
        Expand-Archive localtonet.zip -DestinationPath localtonet
    
    - name: Setup RDP Access
      run: |
        # Enable Remote Desktop
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # Set runneradmin password
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Start Localtonet Tunnel
      shell: pwsh
      env:
        LT_TOKEN: ${{ secrets.LOCALTONET_TOKEN }}
      run: |
        # Start Localtonet in the background
        Start-Process -FilePath ".\localtonet\localtonet.exe" -ArgumentList "authtoken $env:LT_TOKEN"
        
        # Wait a moment for authentication to sync
        Start-Sleep -Seconds 5
        
        # Create the TCP tunnel for RDP (Port 3389)
        # This step will stay active and keep the workflow running
        .\localtonet\localtonet.exe tcp 3389
