name: CI-RDP-Serveo

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure RDP
        shell: pwsh
        run: |
          # Enable RDP and firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          # Set Password
          $Password = ConvertTo-SecureString "GitHubRDP123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

      - name: Start Serveo Tunnel
        shell: pwsh
        run: |
          Write-Host "--- TUNNEL STARTING ---"
          Write-Host "If the URL does not appear, refresh this page in 30 seconds."
          
          # This command asks serveo.net to forward a random port to your local 3389
          # We use -o StrictHostKeyChecking=no to bypass the finger-print prompt
          ssh -o StrictHostKeyChecking=no -R 0:localhost:3389 serveo.net
          
