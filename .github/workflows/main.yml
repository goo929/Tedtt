name: ZeroTier-RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure High-Latency RDP Settings
        run: |
          # Enable RDP and force basic Security Layer to prevent the "Configuring" hang on mobile
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Open firewall for RDP
          netsh advfirewall firewall add rule name="RDP-ZeroTier" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          # Generating a secure random password
          $charSet = @{ Upper = [char[]](65..90); Lower = [char[]](97..122); Number = [char[]](48..57); Special = [char[]](33..47) }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          Write-Host "User 'RDP' created successfully."

      - name: Install ZeroTier
        run: |
          # Use the stable MSI installer
          $ztUrl = "https://download.zerotier.com/dist/ZeroTier%20One.msi"
          $installerPath = "$env:TEMP\zerotier.msi"
          Invoke-WebRequest -Uri $ztUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          
          # Start the service and wait for it to initialize
          Start-Service -Name "ZeroTierOneService" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 10

      - name: Join ZeroTier Network
        run: |
          $ZT_PATH = "C:\Program Files (x86)\ZeroTier\One\zerotier-one_x64.exe"
          
          # Join your specific Network ID
          & $ZT_PATH -q join 76fc96e498103c1c
          
          Write-Host "Joined network. Waiting for IP assignment..."
          Start-Sleep -Seconds 20
          
          # Retrieve the assigned ZeroTier IP
          $ztInfo = & $ZT_PATH -q listnetworks
          Write-Host $ztInfo
          
          # Extract the IP address assigned by ZeroTier
          $ztIP = ($ztInfo | Select-String -Pattern "(\d{1,3}\.){3}\d{1,3}").Matches.Value | Select-Object -First 1
          
          if (-not $ztIP) {
              Write-Error "ZeroTier IP not found. Ensure you have AUTHORIZED this device in your ZeroTier Central dashboard!"
              exit 1
          }
          echo "ZT_IP=$ztIP" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n==============================="
          Write-Host "      RDP ACCESS INFO"
          Write-Host "==============================="
          Write-Host "Address: $env:ZT_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASS"
          Write-Host "===============================`n"
          
          while ($true) {
              $currentTime = Get-Date -Format "HH:mm:ss"
              Write-Host "[$currentTime] RDP Session Active via ZeroTier..."
              Start-Sleep -Seconds 300
          }
          
