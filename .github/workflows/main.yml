name: CI-Bore-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Windows RDP
      run: |
        # 1. Enable RDP via Registry
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        
        # 2. Enable Firewall rules
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # 3. Force User Authentication setting in Registry (Replaces the failing WMI call)
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # 4. Create a fresh user
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        New-LocalUser "RemoteUser" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RemoteUser"

    - name: Download and Setup Bore
      run: |
        $url = "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip"
        Invoke-WebRequest -Uri $url -OutFile bore.zip -UserAgent "NativeHost"
        Expand-Archive bore.zip -DestinationPath . -Force

    - name: Start Bore Tunnel
      run: |
        Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore_log.txt"
        
        Start-Sleep -s 10
        
        $BoreLog = Get-Content bore_log.txt
        Write-Host "--------------------------"
        Write-Host "   RDP CONNECTION INFO    "
        Write-Host "--------------------------"
        $BoreLog | Select-String "listening at"
        Write-Host "Username: RemoteUser"
        Write-Host "Password: P@ssw0rd123!"
        Write-Host "--------------------------"
        
        # Keep alive
        Start-Sleep -s 21600
        
