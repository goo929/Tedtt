name: CI-Loophole-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Setup Loophole
      run: |
        # Download Loophole
        Invoke-WebRequest https://github.com/loophole/cli/releases/download/1.0.0-beta.15/loophole_windows_64bit.zip -OutFile loophole.zip
        Expand-Archive loophole.zip -DestinationPath . -Force

    - name: Start Loophole Tunnel
      run: |
        Write-Host "🚀 Starting Loophole Tunnel..."
        # Start loophole for TCP port 3389
        Start-Process -FilePath ".\loophole.exe" -ArgumentList "tcp 3389 --nopreview" -RedirectStandardOutput "loophole_log.txt"
        
        Start-Sleep -s 20
        
        Write-Host "------------------------------------------"
        Write-Host "      YOUR RDP CONNECTION INFO            "
        Write-Host "------------------------------------------"
        # Grabbing the actual address from the log
        Get-Content loophole_log.txt | Select-String "forwarding to"
        Write-Host "User: RemoteUser"
        Write-Host "Pass: P@ssw0rd123!"
        Write-Host "------------------------------------------"
        
        # 6 Hour Keep-Alive
        Start-Sleep -s 21600
        
