name: CI-Ngrok-Final-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Core RDP Settings
      run: |
        # Enable RDP and optimize for mobile tunnel stability
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        
        # Open Firewall for port 3389
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        
        # Restart RDP Service to apply settings
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        # Using a dedicated user to fix the "Username or password did not work" error
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RemoteUser"

    - name: Setup Ngrok
      run: |
        # Download and extract Ngrok
        Invoke-WebRequest https://bin.equinox.io/c/b34edq6tiuz/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip -DestinationPath .
        
        # Authenticate using your secret token
        .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # Start the tunnel using your specific static domain
        # Replace the domain below if you ever change it in the Ngrok dashboard
        Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp --domain=accusatorial-hyacinth-steer.ngrok-free.dev 3389"
        
        Write-Host "🚀 RDP live at: accusatorial-hyacinth-steer.ngrok-free.dev"
        
        # Keep alive for the full 6-hour runner limit
        Start-Sleep -s 21600
        w
