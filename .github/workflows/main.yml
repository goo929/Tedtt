name: RDP
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-anydesk:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:
      #################################################################    
      # 1️⃣ Install & Connect Tailscale    
      ################################################################# 
      - name: Install & Connect Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.92.3-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=anydesk-node
          
          $tsIP = $null    
          for ($i=0;$i -lt 10;$i++){    
            $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4    
            if($tsIP){break}    
            Start-Sleep 5    
          }    
          if(-not $tsIP){exit 1}
          "TAILSCALE_IP=$tsIP" | Out-File -Append $env:GITHUB_ENV

      #################################################################    
      # 2️⃣ Official AnyDesk Installation & Logic    
      ################################################################# 
      - name: Official AnyDesk Installation & Logic
        shell: cmd
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://download.anydesk.com/AnyDesk.exe' -OutFile 'AnyDesk.exe'"
          AnyDesk.exe --install "C:\AnyDesk" --start-with-win --silent
          powershell -Command "Start-Sleep -Seconds 20"
          
          set "adPath=C:\AnyDesk\AnyDesk.exe"
          if not exist "%adPath%" exit 1

          :START_ANYDESK
          start "" "%adPath%" --start
          powershell -Command "Start-Sleep -Seconds 10"

          for /f "delims=" %%i in ('"%adPath%" --get-id') do set "ID=%%i"
          if "%ID%"=="" ( taskkill /f /im anydesk.exe > nul 2>&1 & goto START_ANYDESK )
          if "%ID%"=="0" ( taskkill /f /im anydesk.exe > nul 2>&1 & goto START_ANYDESK )
          
          echo 1234thanks | "%adPath%" --set-password _full_access
          echo ANYDESK_ID=%ID% >> %GITHUB_ENV%

      #################################################################    
      # 3️⃣ Send Credentials to Telegram    
      ################################################################# 
      - name: Send Notification to Telegram    
        shell: powershell
        env:    
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}    
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    
          AD_IP: ${{ env.TAILSCALE_IP }}    
          AD_ID: ${{ env.ANYDESK_ID }}
        run: |    
          $nl = [Environment]::NewLine
          $msg = '🚀 <b>Universal AnyDesk Ready</b>' + $nl + $nl + '🌐 <b>IP:</b> <code>' + $env:AD_IP + '</code>' + $nl + '🆔 <b>ID:</b> <code>' + $env:AD_ID + '</code>' + $nl + '👤 <b>User:</b> <code>runneradmin</code>' + $nl + '🔑 <b>Pass:</b> <code>1234thanks</code>'
          
          $payload = @{
              chat_id = $env:TELEGRAM_CHAT_ID
              parse_mode = "HTML"
              text = $msg
          }
          
          $json = ConvertTo-Json $payload
          $url = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"      
          Invoke-RestMethod -Uri $url -Method Post -Body $payload

      #################################################################    
      # 4️⃣ Keep Alive & Cascade Loop Trigger    
      ################################################################# 
      - name: Monitor and Cascade Workflow
        env:    
          GH_PAT: ${{ secrets.GH_PAT }}    
        shell: powershell
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddMinutes(330)) {
            Write-Host "AnyDesk Active | Time: $([math]::Floor((New-TimeSpan -Start $start -End (Get-Date)).TotalMinutes)) min"
            Start-Sleep -Seconds 300
          }
          
          Write-Host "🔄 Dispatching next AnyDesk run..."
          $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches"
          Invoke-RestMethod -Uri $uri -Method POST -Headers @{Authorization="token $env:GH_PAT"; Accept="application/vnd.github+json"} -Body '{"ref":"main"}'

      #################################################################    
      # 5️⃣ Final Status Notification    
      ################################################################# 
      - name: Send Final Status to Telegram    
        if: always()    
        shell: powershell
        env:    
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}    
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    
        run: |    
          $status = "${{ job.status }}"
          $payload = @{
              chat_id = $env:TELEGRAM_CHAT_ID
              parse_mode = "HTML"
              text = "🏁 <b>AnyDesk Session Transitioned</b>" + [Environment]::NewLine + "Status: <b>$status</b>"
          }
          $url = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"
          Invoke-RestMethod -Uri $url -Method Post -Body $payload
          
