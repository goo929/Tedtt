name: CI-Serveo-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Start Serveo Tunnel
      run: |
        Write-Host "🚀 Starting Serveo Tunnel..."
        
        $totalTime = 21600 # 6 hours
        $startTime = Get-Date
        
        while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -lt $totalTime) {
            # Start Serveo in the background. -R 0:localhost:3389 tells it to pick a random port for us.
            Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 0:localhost:3389 serveo.net" -RedirectStandardOutput "serveo_log.txt" -RedirectStandardError "serveo_err.txt"
            
            # Wait for the link to generate
            Start-Sleep -s 15
            
            Write-Host "------------------------------------------"
            Write-Host "      YOUR RDP CONNECTION INFO            "
            Write-Host "------------------------------------------"
            
            # Check both output and error logs for the forwarding line
            $LogData = Get-Content serveo_log.txt, serveo_err.txt -ErrorAction SilentlyContinue
            $Addr = $LogData | Select-String "Forwarding HTTP" -NotMatch | Select-String "forwarding"
            
            if ($Addr) {
                Write-Host "URL: $Addr"
            } else {
                Write-Host "⚠️ Checking full log for address..."
                $LogData
            }
            
            Write-Host "User: RemoteUser"
            Write-Host "Pass: P@ssw0rd123!"
            Write-Host "------------------------------------------"
            
            # Keep monitoring the SSH process
            while ($true) {
                Start-Sleep -s 30
                if ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -ge $totalTime) { break }
                if (!(Get-Process ssh -ErrorAction SilentlyContinue)) {
                    Write-Host "⚠️ Tunnel dropped. Restarting..."
                    break
                }
            }
            Remove-Item serveo_log.txt, serveo_err.txt -ErrorAction SilentlyContinue
        }
        
