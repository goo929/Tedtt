name: RDP
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-anydesk:
    runs-on: windows-latest
    timeout-minutes: 3600
    steps:
      - name: 1. Install & Connect Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.92.3-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=gh-runner-${{ github.run_id }}
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          "TAILSCALE_IP=$tsIP" | Out-File -Append $env:GITHUB_ENV

      - name: 2. Official AnyDesk Installation & Logic
        shell: cmd
        run: |
          powershell -Command "Invoke-WebRequest -Uri 'https://download.anydesk.com/AnyDesk.exe' -OutFile 'AnyDesk.exe'"
          AnyDesk.exe --install "C:\AnyDesk" --start-with-win --silent
          powershell -Command "Start-Sleep -Seconds 20"
          
          set "adPath=C:\AnyDesk\AnyDesk.exe"
          if not exist "%adPath%" exit 1

          :START_ANYDESK
          start "" "%adPath%" --start
          powershell -Command "Start-Sleep -Seconds 10"

          for /f "delims=" %%i in ('"%adPath%" --get-id') do set "ID=%%i"
          if "%ID%"=="" ( taskkill /f /im anydesk.exe > nul 2>&1 & goto START_ANYDESK )
          if "%ID%"=="0" ( taskkill /f /im anydesk.exe > nul 2>&1 & goto START_ANYDESC )
          
          echo 1234thanks | "%adPath%" --set-password _full_access
          echo ANYDESK_ID=%ID% >> %GITHUB_ENV%

      - name: 3. Send Telegram Notification
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Use a Here-String (@' ... '@) to avoid all character/tag parsing errors
          $msg = @'
          🚀 Universal AnyDesk Ready

          🌐 IP: <code>$env:TAILSCALE_IP</code>
          🆔 ID: <code>$env:ANYDESK_ID</code>
          👤 User: <code>runneradmin</code>
          🔑 Pass: <code>1234thanks</code>
          '@
          
          # Replace environment variables inside the here-string
          $msg = $msg.Replace('$env:TAILSCALE_IP', $env:TAILSCALE_IP)
          $msg = $msg.Replace('$env:ANYDESK_ID', $env:ANYDESK_ID)
          
          $payload = @{ chat_id = $env:TELEGRAM_CHAT_ID; parse_mode = "HTML"; text = $msg }
          $url = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"
          Invoke-RestMethod -Uri $url -Method Post -Body $payload

      - name: 4. Keep Alive & Cascade Loop
        shell: powershell
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddMinutes(330)) {
              Write-Host "Online | AnyDesk ID: $env:ANYDESK_ID | $(Get-Date)"
              Start-Sleep -Seconds 300
          }
          
          Write-Host "🔄 Triggering next session..."
          $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches"
          $headers = @{Authorization = "token $env:GH_PAT"; Accept = "application/vnd.github+json"}
          Invoke-RestMethod -Uri $uri -Method POST -Headers $headers -Body '{"ref":"main"}'
          
