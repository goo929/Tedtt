name: ZeroTier-RDP-Fixed

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-ZT" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $pass = "P@ssw0rd123!" # Using a static one for now to avoid env issues
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name "RDP_User" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP_User"
          Write-Host "User: RDP_User | Pass: $pass"

      - name: Install ZeroTier
        run: |
          $tsUrl = "https://download.zerotier.com/dist/ZeroTier%20One.msi"
          $installerPath = "$env:TEMP\zerotier.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

      - name: Join Network (Aggressive Search)
        run: |
          # Wait for files to appear after quiet install
          Start-Sleep -Seconds 15
          
          # Find the executable wherever it may be
          $ztCli = Get-ChildItem -Path "C:\Program Files*" -Filter "zerotier-one_x64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          
          if ($null -eq $ztCli) {
              Write-Error "ZeroTier executable not found in Program Files. Checking service..."
              exit 1
          }
          
          Write-Host "Found ZeroTier at: $ztCli"
          
          # Join the network
          & $ztCli -q join 76fc96e498103c1c
          
          # Wait and grab IP
          Start-Sleep -Seconds 25
          $info = & $ztCli -q listnetworks
          $info
          
          $ztIP = ($info | Select-String -Pattern "(\d{1,3}\.){3}\d{1,3}").Matches.Value | Select-Object -First 1
          Write-Host "-------------------------------"
          Write-Host "ZT IP: $ztIP"
          Write-Host "-------------------------------"

      - name: Maintain Connection
        run: |
          while ($true) {
              Write-Host "RDP Active - $(Get-Date)"
              Start-Sleep -Seconds 300
          }
          
