name: CI-Pinggy-RDP-Stable

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Start Rugged SSH Tunnel
      run: |
        Write-Host "🚀 Starting Pinggy Tunnel..."
        
        $totalTime = 21600
        $startTime = Get-Date
        
        while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -lt $totalTime) {
            Write-Host "Connecting to Pinggy..."
            
            # Start SSH and redirect BOTH output and errors to the same log file
            # This ensures we catch the address link
            ShellExecute -FilePath "ssh" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -T -R 0:localhost:3389 rdp@a.pinggy.io" > pinggy_log.txt 2>&1
            
            # Wait a bit longer for the link to appear
            Start-Sleep -s 15
            
            Write-Host "------------------------------------------"
            Write-Host "      YOUR RDP CONNECTION INFO            "
            Write-Host "------------------------------------------"
            
            $LogContent = Get-Content pinggy_log.txt
            $Addr = $LogContent | Select-String "tcp://"
            
            if ($Addr) {
                Write-Host $Addr
            } else {
                Write-Host "Link not found yet. Full Log Output:"
                Write-Host $LogContent
            }
            
            Write-Host "User: RemoteUser"
            Write-Host "Pass: P@ssw0rd123!"
            Write-Host "------------------------------------------"
            
            # Monitoring loop
            while ($true) {
                Start-Sleep -s 30
                if ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -ge $totalTime) { break }
                
                # Check if SSH is still running
                if (!(Get-Process ssh -ErrorAction SilentlyContinue)) {
                    Write-Host "⚠️ SSH Tunnel crashed. Restarting..."
                    break
                }
            }
            Remove-Item pinggy_log.txt -ErrorAction SilentlyContinue
        }
        
