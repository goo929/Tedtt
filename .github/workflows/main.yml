name: CI-Localtonet-Fixed

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download and Extract Localtonet
      shell: pwsh
      run: |
        # Using a direct link that bypasses typical 404 browser redirects
        $url = "https://localtonet.com/download/localtonet-windows-x64.zip"
        Invoke-WebRequest -Uri $url -OutFile "localtonet.zip" -UserAgent "Mozilla/5.0"
        Expand-Archive -Path "localtonet.zip" -DestinationPath "localtonet"

    - name: Setup RDP Access
      shell: pwsh
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # Setting a more secure temporary password
        $Password = ConvertTo-SecureString "GitHubRDP123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Start Localtonet Tunnel
      shell: pwsh
      env:
        LT_TOKEN: ${{ secrets.LOCALTONET_TOKEN }}
      run: |
        # Run the auth and start the tunnel in one go
        Start-Process -FilePath ".\localtonet\localtonet.exe" -ArgumentList "authtoken $env:LT_TOKEN"
        Start-Sleep -Seconds 5
        
        Write-Host "Starting TCP Tunnel on Port 3389..."
        # This command blocks the runner and keeps it alive
        .\localtonet\localtonet.exe tcp 3389
        
