name: CI-Pinggy-RDP-Stable

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Start Rugged SSH Tunnel
      run: |
        Write-Host "🚀 Starting Pinggy Tunnel..."
        
        $totalTime = 21600
        $startTime = Get-Date
        
        while ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -lt $totalTime) {
            Write-Host "Connecting to Pinggy..."
            
            # Use Start-Process and redirect both output and errors to catch the URL
            Start-Process -FilePath "ssh" -ArgumentList "-p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -T -R 0:localhost:3389 rdp@a.pinggy.io" -RedirectStandardOutput "pinggy_out.txt" -RedirectStandardError "pinggy_err.txt"
            
            # Wait for the handshake to finish
            Start-Sleep -s 15
            
            Write-Host "------------------------------------------"
            Write-Host "      YOUR RDP CONNECTION INFO            "
            Write-Host "------------------------------------------"
            
            # Combine the output from both files to find the link
            $LogContent = Get-Content pinggy_out.txt, pinggy_err.txt -ErrorAction SilentlyContinue
            $Addr = $LogContent | Select-String "tcp://" | Select-Object -Last 1
            
            if ($Addr) {
                Write-Host "ADDRESS: $Addr"
            } else {
                Write-Host "⚠️ Link not found yet. Checking logs..."
                $LogContent
            }
            
            Write-Host "User: RemoteUser"
            Write-Host "Pass: P@ssw0rd123!"
            Write-Host "------------------------------------------"
            
            # Monitoring loop to keep the script running
            while ($true) {
                Start-Sleep -s 30
                if ((New-TimeSpan -Start $startTime -End (Get-Date)).TotalSeconds -ge $totalTime) { break }
                
                if (!(Get-Process ssh -ErrorAction SilentlyContinue)) {
                    Write-Host "⚠️ Connection flickered. Restarting tunnel..."
                    break
                }
            }
            Remove-Item pinggy_out.txt, pinggy_err.txt -ErrorAction SilentlyContinue
        }
        
