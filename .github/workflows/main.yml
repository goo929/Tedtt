name: CI-Cloudflare-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Core RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Start Cloudflare Tunnel
      run: |
        Write-Host "🚀 Starting Cloudflare Tunnel..."
        
        # Download the latest stable cloudflared.exe
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
        
        # Start a quick tunnel for RDP
        Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "cf_log.txt"
        
        # Wait for the link to be generated
        Start-Sleep -s 20
        
        Write-Host "------------------------------------------"
        Write-Host "      YOUR RDP CONNECTION INFO            "
        Write-Host "------------------------------------------"
        
        # Cloudflare prints the link to the error stream/log
        $CFLog = Get-Content cf_log.txt
        $Addr = $CFLog | Select-String "trycloudflare.com" | Select-Object -First 1
        
        if ($Addr) {
            Write-Host "ADDRESS: $Addr"
        } else {
            Write-Host "⚠️ Checking logs for link..."
            $CFLog | Select-String "inf" | Select-Object -Last 10
        }
        
        Write-Host "User: RemoteUser"
        Write-Host "Pass: P@ssw0rd123!"
        Write-Host "------------------------------------------"
        
        # Keep alive for 6 hours
        Start-Sleep -s 21600
        
