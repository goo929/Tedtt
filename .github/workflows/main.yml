name: CI-Stable-RDP

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RemoteUser"

    - name: Install Playit via Winget
      run: |
        winget install DevelopedMethods.playit --accept-package-agreements --accept-source-agreements

    - name: Find and Start Playit Agent
      run: |
        # Search for the playit.exe file anywhere on the system
        Write-Host "Searching for playit.exe..."
        $playitFile = Get-ChildItem -Path "C:\" -Filter "playit.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        
        if ($playitFile) {
            $fullPath = $playitFile.FullName
            Write-Host "Found Playit at: $fullPath"
            
            # Start the process using the discovered path
            Start-Process -FilePath $fullPath -RedirectStandardOutput "playit_log.txt"
            
            # Wait for logs to populate
            Start-Sleep -s 30
            
            Write-Host "--- LOOK BELOW FOR CLAIM URL ---"
            Get-Content playit_log.txt | Select-String "https://playit.gg/claim/"
            Write-Host "---------------------------------"
        } else {
            Write-Error "Could not find playit.exe after installation."
            exit 1
        }
        
        # Keep alive for 6 hours
        Start-Sleep -s 21600
        
