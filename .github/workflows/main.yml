name: CI-Cloudflare-Final

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Configure Core RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
        if (!(Get-LocalUser -Name "RemoteUser" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RemoteUser" -Password $Password -Description "RDP User" -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RemoteUser"
        }

    - name: Start Cloudflare Tunnel
      run: |
        Write-Host "🚀 Starting Cloudflare Tunnel..."
        
        # Download Cloudflared
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
        
        # Start Tunnel - Note: RDP requires the tcp:// prefix
        Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "cf_log.txt"
        
        # Give Cloudflare 30 seconds to establish the link over the network
        Start-Sleep -s 30
        
        Write-Host "------------------------------------------"
        Write-Host "      YOUR RDP CONNECTION INFO            "
        Write-Host "------------------------------------------"
        
        # This regex specifically looks for the hostname in the log
        $CFLog = Get-Content cf_log.txt
        $Addr = $CFLog | Select-String -Pattern "https://[a-z0-9-]+\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
        
        if ($Addr) {
            # Convert the HTTPS link Cloudflare prints to a TCP hostname for your app
            $TCP_Addr = $Addr.Replace("https://", "")
            Write-Host "HOSTNAME: $TCP_Addr"
        } else {
            Write-Host "⚠️ Link still loading. Full Logs below:"
            $CFLog | Select-Object -Last 20
        }
        
        Write-Host "User: RemoteUser"
        Write-Host "Pass: P@ssw0rd123!"
        Write-Host "------------------------------------------"
        
        Start-Sleep -s 21600
