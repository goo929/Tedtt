name: CI-RDP-Pinggy-Final

on: 
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure RDP Access
        shell: pwsh
        run: |
          # 1. Enable Remote Desktop and Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          # 2. Set the runneradmin password
          $Password = ConvertTo-SecureString "GitHubRDP123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          Write-Host "RDP Configuration Complete."

      - name: Start Network Tunnel
        shell: pwsh
        run: |
          Write-Host "--- TUNNEL INITIALIZING ---"
          Write-Host "Wait 10-15 seconds for the URL to appear below."
          
          # 'tcp+1' forces Pinggy to output a plain-text URL compatible with GitHub logs.
          # -o StrictHostKeyChecking=no prevents the 'yes/no' prompt.
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:3389 tcp+1@a.pinggy.io
          
